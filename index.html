<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ Polla familia peluche</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    margin-bottom:30px;
    color:#ddd;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
}

.match{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:16px;
}

.score{
    display:flex;
    gap:15px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:10px;
    padding:14px;
    font-weight:bold;
}

#guardarBtn{
    width:100%;
    margin-top:15px;
    background:#00a651;
    color:white;
}

#guardarBtn:hover{
    background:#008542;
}

.pronostico{
    background:white;
    color:black;
    padding:15px;
    border-radius:12px;
    margin-top:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.deleteBtn{
    background:#d62828;
    color:white;
}

.contador{
    margin-top:10px;
    color:#ffd700;
    font-weight:bold;
}

@media(max-width:700px){

    .score{
        flex-direction:column;
    }

    .pronostico{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    .match{
        font-size:24px;
    }
}

</style>
</head>
<body>

<div class="container">

<h1>⚽ Polla familia peluche ⚽</h1>
<div class="subtitle">
Colombia 🇨🇴 vs Portugal 🇵🇹
</div>

    <div id="estadoPronostico"
style="
text-align:center;
font-size:18px;
font-weight:bold;
color:#FFD700;
margin-bottom:10px;
">
</div>

<div id="contadorTiempo"
style="
text-align:center;
font-size:24px;
font-weight:bold;
color:white;
margin-bottom:20px;
">
</div>

<div class="card">

<div class="match">
🇨🇴 COLOMBIA VS PORTUGAL 🇵🇹
</div>

<input
id="nombre"
placeholder="Tu nombre">

<div class="score">

<input
id="colombia"
type="number"
min="0"
placeholder="Goles Colombia">

<input
id="portugal"
type="number"
min="0"
placeholder="Goles Portugal">

</div>

<button id="guardarBtn">
⚽ Guardar Pronóstico
</button>

</div>

<div class="card">

<h2>🏆 Pronósticos registrados</h2>

<div id="contador" class="contador">
0 participantes
</div>

<div id="lista"></div>

</div>

</div>

<script type="module">

import { createClient }
from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://pdicfgdzetykamooblfs.supabase.co",
"sb_publishable_OFkf6Xc6GFNeaRUnFzf9CA_f9coWbqL"
);

    // ====================
// CIERRE DE POLLA
// ====================

// CAMBIA LA FECHA AL SÁBADO QUE NECESITES
const fechaCierre = new Date("2026-06-27T18:00:00-05:00");

function actualizarContador(){

    const ahora = new Date();
    const diferencia = fechaCierre - ahora;

    if(diferencia <= 0){

        document.getElementById("estadoPronostico").innerHTML =
        "🔒 Pronósticos cerrados";

        document.getElementById("contadorTiempo").innerHTML =
        "⏰ El plazo terminó";

        const btn =
        document.getElementById("guardarBtn");

        btn.disabled = true;
        btn.innerHTML = "🔒 Pronósticos Cerrados";
        btn.style.background = "#666";

        return;
    }

    const dias = Math.floor(
        diferencia / (1000*60*60*24)
    );

    const horas = Math.floor(
        (diferencia % (1000*60*60*24))
        /
        (1000*60*60)
    );

    const minutos = Math.floor(
        (diferencia % (1000*60*60))
        /
        (1000*60)
    );

    const segundos = Math.floor(
        (diferencia % (1000*60))
        /
        1000
    );

    document.getElementById("estadoPronostico").innerHTML =
    "✅ Pronósticos abiertos";

    document.getElementById("contadorTiempo").innerHTML =
    `⏳ Cierre en ${dias}d ${horas}h ${minutos}m ${segundos}s`;
}

actualizarContador();

setInterval(
    actualizarContador,
    1000
);

async function cargarPronosticos(){

    const { data, error } = await supabase
    .from("pronosticos")
    .select("*")
    .order("created_at",{ascending:false});

    if(error){
        console.error(error);
        return;
    }

    document.getElementById("contador").innerHTML =
    `${data.length} participante(s)`;

    const lista =
    document.getElementById("lista");

    lista.innerHTML = "";

    data.forEach(item=>{

        const fila =
        document.createElement("div");

        fila.className = "pronostico";

        fila.innerHTML = `
        <div>
            <strong>${item.nombre}</strong><br>
            🇨🇴 ${item.colombia} - ${item.portugal} 🇵🇹
        </div>
        `;

        lista.appendChild(fila);
    });

    document.querySelectorAll(".deleteBtn")
    .forEach(btn=>{

        btn.addEventListener("click", async ()=>{

            const id =
            btn.dataset.id;

            const { error } =
            await supabase
            .from("pronosticos")
            .delete()
            .eq("id", id);

            if(error){
                alert(error.message);
                return;
            }

            cargarPronosticos();

        });

    });

}

document
.getElementById("guardarBtn")
.addEventListener("click", async ()=>{

    // Verificar si la polla ya cerró
    if(new Date() >= fechaCierre){
        alert("🔒 La Polla Familia Peluche ya está cerrada.");
        return;
    }

    const nombre =
    document.getElementById("nombre").value.trim();

    const colombia =
    document.getElementById("colombia").value;

    const portugal =
    document.getElementById("portugal").value;

    if(!nombre){
        alert("Ingresa tu nombre");
        return;
    }

    if(colombia === "" || portugal === ""){
        alert("Ingresa los marcadores");
        return;
    }

    const { error } =
    await supabase
    .from("pronosticos")
    .insert({
        nombre,
        colombia:Number(colombia),
        portugal:Number(portugal)
    });

    if(error){
        console.error(error);
        alert(error.message);
        return;
    }

    document.getElementById("nombre").value="";
    document.getElementById("colombia").value="";
    document.getElementById("portugal").value="";

    cargarPronosticos();

});

cargarPronosticos();

</script>

</body>
</html>
